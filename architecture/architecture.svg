<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="400" fill="#0F1516" rx="16"/>
  
  <!-- Definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8B15B;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#D8B15B;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Connectors -->
  <path d="M 170 200 L 320 200" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,4" opacity="0.5" fill="none"/>
  <path d="M 480 200 L 630 200" stroke="#4ADE80" stroke-width="2" stroke-dasharray="4,4" opacity="0.5" fill="none"/>
  <path d="M 790 200 L 920 200" stroke="#D8B15B" stroke-width="2" stroke-dasharray="4,4" opacity="0.5" fill="none"/>
  
  <circle cx="245" cy="200" r="4" fill="#3B82F6"/>
  <circle cx="555" cy="200" r="4" fill="#4ADE80"/>
  <circle cx="855" cy="200" r="4" fill="#D8B15B"/>

  <!-- Block 1: Repository -->
  <g transform="translate(50, 120)">
    <rect width="120" height="160" rx="12" fill="url(#grad1)" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="60" y="50" font-family="'Inter', sans-serif" font-size="14" fill="#B3BDC3" text-anchor="middle" letter-spacing="1">LAYER 1</text>
    <text x="60" y="80" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#F3F2EF" text-anchor="middle">Repository</text>
    <text x="60" y="110" font-family="'Inter', sans-serif" font-size="12" fill="#7F8C94" text-anchor="middle">Raw Data</text>
  </g>

  <!-- Block 2: Analytics & Transformation -->
  <g transform="translate(320, 120)">
    <rect width="160" height="160" rx="12" fill="url(#grad1)" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="80" y="50" font-family="'Inter', sans-serif" font-size="14" fill="#B3BDC3" text-anchor="middle" letter-spacing="1">LAYER 2</text>
    <text x="80" y="80" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#F3F2EF" text-anchor="middle">Transformation</text>
    <text x="80" y="110" font-family="'Inter', sans-serif" font-size="12" fill="#7F8C94" text-anchor="middle">Analytics Engine</text>
  </g>

  <!-- Block 3: Decision Engine -->
  <g transform="translate(630, 100)">
    <rect width="160" height="200" rx="12" fill="url(#grad2)" stroke="#4ADE80" stroke-width="1.5" stroke-opacity="0.5" filter="url(#glow)"/>
    <text x="80" y="60" font-family="'Inter', sans-serif" font-size="14" fill="#B3BDC3" text-anchor="middle" letter-spacing="1">LAYER 3</text>
    <text x="80" y="90" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#F3F2EF" text-anchor="middle">Decision</text>
    <text x="80" y="115" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#F3F2EF" text-anchor="middle">Engine</text>
    <text x="80" y="150" font-family="'Inter', sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle">Recommendations</text>
  </g>

  <!-- Block 4: Presentation -->
  <g transform="translate(920, 120)">
    <path d="M 0 0 L 10 0 L 10 160 L 0 160 Z" fill="url(#grad3)" stroke="#D8B15B" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="25" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#F3F2EF" dominant-baseline="middle" transform="rotate(-90 25,85)">UI / UX</text>
  </g>
</svg>
